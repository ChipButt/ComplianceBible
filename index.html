<body>
<div id="appShell"><header class="topbar"><div><h1>Pub Compliance Hub</h1></div><button id="installBtn" class="ghost small hidden">Install</button></header><main id="app"></main><nav class="bottomNav" aria-label="Main navigation"><button data-route="dashboard" class="navBtn active">Home</button><button data-route="checks" class="navBtn">Checks</button><button data-route="documents" class="navBtn">Docs</button><button data-route="logs" class="navBtn">Issues</button><button data-route="rota" class="navBtn">Rota</button><button data-route="inspection" class="navBtn">Inspect</button><button data-route="settings" class="navBtn">Settings</button></nav></div>

<script>
(function navigationAndHomeActionRefine() {
  if (window.__navigationAndHomeActionRefineV2) return;
  window.__navigationAndHomeActionRefineV2 = true;

  const ROTA_STORAGE_KEY = 'rotaAppUnifiedV2';

  function appState() { try { return state || {}; } catch (_) { return {}; } }
  function html(value) { return String(value == null ? '' : value).replace(/[&<>'"]/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', "'":'&#39;', '"':'&quot;' }[c])); }
  function todayISO() { try { return typeof today === 'function' ? today() : new Date().toISOString().slice(0, 10); } catch (_) { return new Date().toISOString().slice(0, 10); } }
  function currentUserId() { const stateRef = appState(); return stateRef.currentUser || (stateRef.users && stateRef.users[0] && stateRef.users[0].id) || ''; }
  function assignedToCurrentUser(assignedUserId) { const value = String(assignedUserId || '').trim(); const key = value.toLowerCase(); return !value || key === 'everyone' || key === 'all' || key === 'all users' || value === currentUserId(); }
  function isAdminNow() { try { return typeof isAdminUser === 'function' && isAdminUser(); } catch (_) { return false; } }
  function normalise(value) { return String(value || '').trim().toLowerCase(); }
  function normaliseFrequency(value) { const text = String(value || 'Daily').trim(); const key = text.toLowerCase(); if (key === 'yearly') return 'Annual'; if (key === 'six-monthly' || key === 'six monthly' || key === 'every six months') return 'Every 6 Months'; return text || 'Daily'; }
  function readJSON(key, fallback) { try { const parsed = JSON.parse(localStorage.getItem(key) || 'null'); return parsed || fallback; } catch (_) { return fallback; } }
  function writeJSON(key, value) { try { localStorage.setItem(key, JSON.stringify(value)); } catch (_) {} }
  function saveSafe() { try { if (typeof save === 'function') save(); } catch (_) {} }

  function normaliseRotaData(data) {
    const stateRef = appState();
    data = data && typeof data === 'object' ? data : {};
    data.sections = Array.isArray(data.sections) ? data.sections : (stateRef.rotaSettings && stateRef.rotaSettings.sections) || [];
    data.users = Array.isArray(data.users) ? data.users : stateRef.users || [];
    data.shifts = Array.isArray(data.shifts) ? data.shifts : [];
    data.logs = data.logs && typeof data.logs === 'object' ? data.logs : {};
    data.publishedWeeks = data.publishedWeeks && typeof data.publishedWeeks === 'object' ? data.publishedWeeks : {};
    return data;
  }

  function readRotaData() {
    try { if (typeof readRotaState === 'function') return normaliseRotaData(readRotaState() || {}); } catch (_) {}
    return normaliseRotaData(readJSON(ROTA_STORAGE_KEY, {}));
  }
  function writeRotaData(data) { writeJSON(ROTA_STORAGE_KEY, normaliseRotaData(data)); }

  function syncWorkAreasState() {
    const stateRef = appState();
    stateRef.rotaSettings = stateRef.rotaSettings || { sections: [] };
    const rotaData = readRotaData();
    let sections = Array.isArray(stateRef.rotaSettings.sections) ? stateRef.rotaSettings.sections.slice() : [];
    if (!sections.length && Array.isArray(rotaData.sections)) sections = rotaData.sections.slice();
    if (!sections.length && Array.isArray(stateRef.areas)) sections = stateRef.areas.slice();
    sections = Array.from(new Set(sections.map(value => String(value || '').trim()).filter(Boolean)));
    if (!sections.length) sections = ['FOH', 'Kitchen', 'Office'];
    const changed = JSON.stringify(stateRef.areas || []) !== JSON.stringify(sections) || JSON.stringify(stateRef.rotaSettings.sections || []) !== JSON.stringify(sections);
    stateRef.rotaSettings.sections = sections.slice();
    stateRef.areas = sections.slice();
    rotaData.sections = sections.slice();
    if (changed) saveSafe();
    writeRotaData(rotaData);
    return sections;
  }

  function mondayISO(dateInput) { const d = new Date(String(dateInput || todayISO()) + 'T12:00:00'); const dayOffset = (d.getDay() + 6) % 7; d.setDate(d.getDate() - dayOffset); return d.toISOString().slice(0, 10); }
  function isShiftPublished(shift, data) { if (!shift) return false; const week = data.publishedWeeks && data.publishedWeeks[mondayISO(shift.date)]; return !!(shift.publishedAt || (week && Array.isArray(week.shiftIds) && week.shiftIds.indexOf(shift.id) !== -1)); }
  function shiftLog(data, shiftId) { data.logs = data.logs || {}; data.logs[shiftId] = data.logs[shiftId] || { in: null, out: null, breaks: [], events: [] }; data.logs[shiftId].breaks = Array.isArray(data.logs[shiftId].breaks) ? data.logs[shiftId].breaks : []; return data.logs[shiftId]; }
  function shiftStartDate(shift) { return new Date(String(shift.date || todayISO()) + 'T' + String(shift.start || '00:00') + ':00'); }
  function shiftEndDate(shift) { const start = shiftStartDate(shift); const end = new Date(String(shift.date || todayISO()) + 'T' + String(shift.end || '23:59') + ':00'); if (end < start) end.setDate(end.getDate() + 1); return end; }
  function openBreak(log) { return (log && log.breaks || []).find(item => item && item.start && !item.end) || null; }
  function breakDurationMs(log) { const now = Date.now(); return (log && log.breaks || []).reduce((total, item) => { if (!item || !item.start) return total; const start = new Date(item.start).getTime(); const end = item.end ? new Date(item.end).getTime() : now; return Number.isFinite(start) && Number.isFinite(end) && end >= start ? total + (end - start) : total; }, 0); }
  function workedDurationMs(log) { if (!log || !log.in) return 0; const start = new Date(log.in).getTime(); const end = log.out ? new Date(log.out).getTime() : Date.now(); return Number.isFinite(start) && Number.isFinite(end) && end >= start ? Math.max(0, end - start - breakDurationMs(log)) : 0; }
  function formatClock(value) { if (!value) return ''; try { return new Date(value).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }); } catch (_) { return ''; } }
  function formatDuration(ms) { const mins = Math.max(0, Math.round((ms || 0) / 60000)); const hrs = Math.floor(mins / 60); const rem = mins % 60; if (hrs && rem) return hrs + 'h ' + rem + 'm'; if (hrs) return hrs + 'h'; return rem + 'm'; }
  function niceDate(date) { try { return new Date(String(date || '') + 'T12:00:00').toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' }); } catch (_) { return date || ''; } }

  function assignedCheckDueToday(check) {
    if (!check) return false;
    if (!assignedToCurrentUser(check.assignedUserId)) return false;
    try { if (typeof done === 'function' && done(check.id)) return false; } catch (_) {}
    const freq = normaliseFrequency(check.freq || 'Daily');
    const now = new Date();
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    if (freq === 'Weekly' && check.assignedWeeklyDay) return days[now.getDay()] === check.assignedWeeklyDay;
    if (freq === 'Monthly' && check.assignedMonthlyDate) return String(now.getDate()) === String(check.assignedMonthlyDate);
    if (freq === 'Annual' || freq === 'Every 6 Months') {
      const raw = String(check.assignedDueDate || check.dueDate || '');
      if (!raw) return true;
      const parts = raw.split('-').map(Number);
      if (freq === 'Annual') return (parts[1] || 0) === (now.getMonth() + 1) && (parts[2] || 0) === now.getDate();
      const otherMonth = ((parts[1] + 5) % 12) + 1;
      return ((parts[1] || 0) === (now.getMonth() + 1) || otherMonth === (now.getMonth() + 1)) && (parts[2] || 0) === now.getDate();
    }
    return true;
  }
  function assignedChecks() { return (appState().checks || []).filter(assignedCheckDueToday); }

  function openAppModal(title, body, className) {
    if (!modalRoot) return;
    modalRoot.innerHTML = '<div class="modalCard homeActionModalCard" role="dialog" aria-modal="true"><div class="homeActionModalTop"><h2>' + html(title) + '</h2><button class="close" type="button" data-close-home-action-modal>×</button></div><div class="homeActionModalBody">' + body + '</div></div>';
    modalRoot.classList.remove('hidden');
    modalRoot.classList.add('homeActionModalOpen');
    if (className) modalRoot.classList.add(className);
    const close = () => closeAppModal(className);
    const closeButton = modalRoot.querySelector('[data-close-home-action-modal]');
    if (closeButton) closeButton.onclick = close;
    modalRoot.onclick = event => { if (event.target === modalRoot) close(); };
  }
  function closeAppModal(className) { if (!modalRoot) return; modalRoot.classList.add('hidden'); modalRoot.classList.remove('homeActionModalOpen'); if (className) modalRoot.classList.remove(className); modalRoot.innerHTML = ''; modalRoot.onclick = null; }

  function openAssignedChecksModal() {
    const checks = assignedChecks();
    const body = checks.length ? '<div class="homeModalButtonList">' + checks.map(check => '<button type="button" class="homeModalListButton" data-modal-assigned-check="' + html(check.id) + '"><span>' + html(check.title) + '</span><small>' + html(check.area || 'Work area') + ' · ' + html(normaliseFrequency(check.freq)) + ' · Due ' + html(check.due || '') + '</small></button>').join('') + '</div>' : '<p class="muted">No assigned checks due now.</p>';
    openAppModal('Assigned Checks', body, 'assignedChecksModalOpen');
  }

  function visibleUserShifts(data, userId) { return (data.shifts || []).filter(shift => shift && shift.userId === userId).filter(shift => isAdminNow() || isShiftPublished(shift, data)); }
  function shiftCard(shift, data, completed) {
    const log = shiftLog(data, shift.id);
    const activeBreak = openBreak(log);
    const status = log.in && !log.out ? (activeBreak ? 'On break' : 'On shift') : completed ? 'Completed' : 'Upcoming';
    const actual = log.in ? '<p class="muted">Actual start: ' + html(formatClock(log.in)) + (log.out ? ' · Actual end: ' + html(formatClock(log.out)) : '') + '</p>' : '';
    const totals = completed || log.in ? '<p class="muted">Total break time: ' + html(formatDuration(breakDurationMs(log))) + (log.out ? ' · Total hours worked: ' + html(formatDuration(workedDurationMs(log))) : '') + '</p>' : '';
    const notes = shift.notes ? '<p class="muted">' + html(shift.notes) + '</p>' : '';
    return '<article class="listItem homeShiftModalCard"><strong>' + html((shift.date ? niceDate(shift.date) : 'Shift') + ' · ' + (shift.section || 'Work area')) + '</strong><p>' + html((shift.start || '') + (shift.end ? ' – ' + shift.end : '')) + '</p><p class="muted">' + html(status) + '</p>' + actual + totals + notes + '</article>';
  }

  function openShiftsModal() {
    const data = readRotaData();
    const userId = currentUserId();
    const now = new Date();
    const all = visibleUserShifts(data, userId);
    const upcoming = all.filter(shift => { const log = shiftLog(data, shift.id); if (log.out) return false; if (log.in && !log.out) return true; return shiftEndDate(shift) >= now || String(shift.date || '') >= todayISO(); }).sort((a, b) => (String(a.date || '') + ' ' + String(a.start || '')).localeCompare(String(b.date || '') + ' ' + String(b.start || '')));
    const completed = all.filter(shift => !!shiftLog(data, shift.id).out).sort((a, b) => (String(b.date || '') + ' ' + String(b.start || '')).localeCompare(String(a.date || '') + ' ' + String(a.start || '')));
    const upcomingHtml = upcoming.length ? upcoming.map(shift => shiftCard(shift, data, false)).join('') : '<p class="muted">No upcoming shifts</p>';
    const completedHtml = completed.length ? completed.map(shift => shiftCard(shift, data, true)).join('') : '<p class="muted">No completed shifts yet.</p>';
    openAppModal('Shifts', '<h3>Upcoming shifts</h3><div class="homeShiftModalList">' + upcomingHtml + '</div><h3>Completed Shifts</h3><div class="homeShiftModalList">' + completedHtml + '</div>', 'homeShiftsModalOpen');
  }

  function openAssignedCheck(id) {
    closeAppModal('assignedChecksModalOpen');
    if (!id) return;
    if (typeof window.openAssignedCheckOnHome === 'function') return window.openAssignedCheckOnHome(id);
    if (typeof window.openCheckInChecks === 'function') return window.openCheckInChecks(id);
    if (typeof openCheck === 'function') return openCheck(id);
    try { route = 'checks'; if (typeof render === 'function') render(); } catch (_) {}
  }

  function decorateSettings() {
    syncWorkAreasState();
    document.querySelectorAll('[data-open-settings-section="areas"], [data-settings-tab="areas"]').forEach(button => button.remove());
    document.querySelectorAll('[data-open-settings-section="rota"] .settingsSectionButtonText, [data-settings-tab="rota"]').forEach(el => { el.textContent = 'Work Areas'; });
    document.querySelectorAll('[data-open-settings-section="staff-docs"] .settingsSectionButtonText, [data-settings-tab="documents"]').forEach(el => { if (/Required Staff Documents|Documents/i.test(el.textContent || '')) el.textContent = 'Work Area Documents'; });
    const grid = document.querySelector('.settingsSectionGrid');
    if (grid && !grid.querySelector('[data-settings-users-entry]')) {
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'settingsSectionButton';
      button.dataset.settingsUsersEntry = 'true';
      button.innerHTML = '<span class="settingsSectionButtonText">Users</span><span class="settingsSectionCog" aria-hidden="true"></span>';
      grid.insertBefore(button, grid.children[2] || null);
    }
    document.querySelectorAll('#modal.settingsModalOpen h2, #modal.settingsModalOpen h3, .settingsModalBody h2').forEach(el => {
      const text = String(el.textContent || '').trim();
      if (/^Rota setup$/i.test(text)) el.textContent = 'Work Areas';
      if (/^Required staff documents$/i.test(text) || /^Required Staff Documents$/i.test(text)) el.textContent = 'Work Area Documents';
    });
    document.querySelectorAll('#modal.settingsModalOpen input[placeholder="New rota section"]').forEach(input => { input.placeholder = 'New work area'; });
    document.querySelectorAll('#modal.settingsModalOpen button').forEach(button => { if (String(button.textContent || '').trim() === 'Add rota section') button.textContent = 'Add work area'; });
  }

  function decorateHomeActionButtons() {
    const panel = document.querySelector('.rotaHomePanel');
    if (!panel) return;
    panel.querySelectorAll('.homeAssignedChecks').forEach(el => el.remove());
    panel.querySelectorAll(':scope > h2').forEach(heading => { if (/Upcoming shifts/i.test(heading.textContent || '')) heading.remove(); });
    panel.querySelectorAll(':scope > .homeShiftList').forEach(el => el.remove());
    const checksCount = assignedChecks().length;
    const htmlBody = '<button type="button" class="homePanelActionButton" data-open-home-assigned-modal><span>Assigned Checks</span><small>' + html(checksCount + ' due') + '</small></button><button type="button" class="homePanelActionButton" data-open-home-shifts-modal><span>Shifts</span><small>Upcoming & completed</small></button>';
    let grid = panel.querySelector('.homePanelActionGrid');
    if (!grid) {
      grid = document.createElement('div');
      grid.className = 'homePanelActionGrid';
      const anchor = panel.querySelector('.homeShiftControlPanel') || panel.querySelector('.homeClockCard') || panel.querySelector('.rotaHomeIdentity');
      if (anchor) anchor.insertAdjacentElement('afterend', grid); else panel.prepend(grid);
    }
    if (grid.innerHTML !== htmlBody) grid.innerHTML = htmlBody;
  }

  function decorateNotificationDots() { document.querySelectorAll('.bottomNav .navBtn[data-alert-count], .mainNav .navBtn[data-alert-count]').forEach(button => button.classList.add('hasLeftAlertDot')); }
  function applyRefinements() { decorateSettings(); decorateHomeActionButtons(); decorateNotificationDots(); }

  const style = document.createElement('style');
  style.id = 'navigation-home-refine-style';
  style.textContent = `
    .bottomNav .navBtn[data-alert-count]::after, .mainNav .navBtn[data-alert-count]::after { content: '' !important; position: absolute !important; top: 3px !important; right: 4px !important; left: auto !important; width: 8px !important; min-width: 8px !important; height: 8px !important; min-height: 8px !important; padding: 0 !important; border-radius: 999px !important; background: #d90808 !important; border: 0 !important; box-shadow: none !important; z-index: 5 !important; color: transparent !important; font-size: 0 !important; line-height: 0 !important; text-align: center !important; }
    .homePanelActionGrid { display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 10px !important; margin: 12px 0 14px !important; }
    .homePanelActionButton { min-height: 74px !important; display: grid !important; place-items: center !important; gap: 4px !important; text-align: center !important; border-radius: 18px !important; }
    .homePanelActionButton span { color: #070707 !important; font-size: 16px !important; font-weight: 950 !important; }
    .homePanelActionButton small { color: #111 !important; opacity: .78 !important; font-size: 11px !important; font-weight: 850 !important; }
    #modal.homeActionModalOpen { position: fixed !important; inset: calc(var(--fixed-topbar-height,112px) + var(--fixed-mainnav-height,80px)) 0 0 0 !important; z-index: 1200 !important; display: flex !important; align-items: flex-start !important; justify-content: center !important; padding: 16px 14px max(16px,env(safe-area-inset-bottom)) !important; background: rgba(0,0,0,.62) !important; box-sizing: border-box !important; overflow: hidden !important; }
    #modal.homeActionModalOpen.hidden { display: none !important; }
    #modal.homeActionModalOpen .homeActionModalCard { width: min(700px,100%) !important; max-height: 100% !important; overflow-y: auto !important; overflow-x: hidden !important; margin: 0 !important; padding: 16px !important; box-sizing: border-box !important; }
    .homeActionModalTop { display: grid !important; grid-template-columns: minmax(0,1fr) 40px !important; align-items: center !important; gap: 12px !important; margin-bottom: 12px !important; }
    .homeActionModalTop h2 { margin: 0 !important; }
    .homeActionModalBody, .homeModalButtonList, .homeShiftModalList { display: grid !important; gap: 12px !important; }
    .homeModalListButton { min-height: 66px !important; display: grid !important; gap: 4px !important; align-items: center !important; text-align: left !important; padding: 12px 14px !important; }
    .homeModalListButton span { font-size: 16px !important; font-weight: 950 !important; color: #070707 !important; }
    .homeModalListButton small { color: #111 !important; font-size: 12px !important; opacity: .78 !important; }
    .homeShiftModalCard { display: grid !important; gap: 5px !important; }
    .homeShiftModalCard strong { color: #fff8ea !important; }
    .homeShiftModalCard p { margin: 0 !important; }
  `;
  document.head.appendChild(style);

  const previousRender = typeof render === 'function' && render;
  if (previousRender && !previousRender.__navigationAndHomeActionRefineV2) {
    render = function renderWithNavigationAndHomeActionRefine() { const result = previousRender(); setTimeout(applyRefinements, 0); return result; };
    render.__navigationAndHomeActionRefineV2 = true;
  }
  const previousBind = typeof bind === 'function' && bind;
  if (previousBind && !previousBind.__navigationAndHomeActionRefineV2) {
    bind = function bindWithNavigationAndHomeActionRefine() { previousBind(); applyRefinements(); };
    bind.__navigationAndHomeActionRefineV2 = true;
  }

  document.addEventListener('click', event => {
    const areaButton = event.target.closest('[data-open-settings-section="areas"], [data-settings-tab="areas"]');
    if (areaButton) { event.preventDefault(); event.stopPropagation(); return; }
    const usersButton = event.target.closest('[data-settings-users-entry]');
    if (usersButton) { event.preventDefault(); try { if (typeof openCoreSettingsSection === 'function') openCoreSettingsSection('users'); } catch (_) {} return; }
    const assignedModalButton = event.target.closest('[data-open-home-assigned-modal]');
    if (assignedModalButton) { event.preventDefault(); openAssignedChecksModal(); return; }
    const shiftsModalButton = event.target.closest('[data-open-home-shifts-modal]');
    if (shiftsModalButton) { event.preventDefault(); openShiftsModal(); return; }
    const assignedCheckButton = event.target.closest('[data-modal-assigned-check]');
    if (assignedCheckButton) { event.preventDefault(); openAssignedCheck(assignedCheckButton.dataset.modalAssignedCheck); return; }
    setTimeout(applyRefinements, 0);
  }, true);
  document.addEventListener('change', () => setTimeout(applyRefinements, 0), true);
  syncWorkAreasState();
  applyRefinements();
  try { if (typeof render === 'function') render(); } catch (_) {}
})();
</script>
