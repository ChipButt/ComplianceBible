<script>
(function(){
  if(window.__homeReportPopupAndCheckBadgeFixV3) return;
  window.__homeReportPopupAndCheckBadgeFixV3 = true;
  var lockedScrollY = 0;
  var style = document.createElement("style");
  style.textContent = ".homeReportIssue>form{display:none!important}.homeReportIssue summary{display:flex!important;justify-content:center!important;text-align:center!important}.homeReportIssue summary:after{content:none!important;display:none!important}body.home-report-modal-open{overflow:hidden!important;position:fixed!important;width:100%!important;left:0!important;right:0!important}#modal.homeReportIssueModalOpen{position:fixed!important;inset:calc(var(--fixed-topbar-height,112px) + var(--fixed-mainnav-height,80px)) 0 0 0!important;z-index:1000!important;display:flex!important;align-items:flex-start!important;justify-content:center!important;padding:16px 14px max(16px,env(safe-area-inset-bottom))!important;background:rgba(0,0,0,.58)!important;box-sizing:border-box!important;overflow:hidden!important}#modal.homeReportIssueModalOpen.hidden{display:none!important}#modal.homeReportIssueModalOpen .homeReportModalCard{width:min(680px,100%)!important;max-height:100%!important;margin:0!important;overflow-y:auto!important;overflow-x:hidden!important;-webkit-overflow-scrolling:touch!important;box-sizing:border-box!important;border-radius:24px!important;padding:18px!important}#modal.homeReportIssueModalOpen .homeReportModalHeader{display:grid!important;grid-template-columns:minmax(0,1fr) 38px!important;align-items:center!important;gap:12px!important;margin-bottom:14px!important}#modal.homeReportIssueModalOpen .homeReportModalHeader h2{margin:0!important;color:#d83b2d!important}#modal.homeReportIssueModalOpen .homeReportModalClose{width:38px!important;height:38px!important;min-width:38px!important;min-height:38px!important;border-radius:999px!important;display:flex!important;align-items:center!important;justify-content:center!important;padding:0!important;margin:0!important;border:0!important;background:rgba(8,10,12,.72)!important;color:#fff8ea!important;font-size:26px!important;line-height:1!important}.homeReportSummaryBox{min-height:92px!important;resize:vertical!important}.homeReportOtherType{display:none!important}.homeReportOtherType.active{display:block!important}";
  document.head.appendChild(style);
  function lock(){lockedScrollY=window.scrollY||document.documentElement.scrollTop||document.body.scrollTop||0;document.body.style.top="-"+lockedScrollY+"px";document.body.classList.add("home-report-modal-open");document.documentElement.style.overflow="hidden";}
  function unlock(){document.body.classList.remove("home-report-modal-open");document.body.style.top="";document.documentElement.style.overflow="";window.scrollTo(0,lockedScrollY||0);}
  function closeReport(){modal.classList.add("hidden");modal.classList.remove("homeReportIssueModalOpen");modal.innerHTML="";unlock();}
  function syncOtherType(){var select=document.getElementById("homeReportType");var other=document.getElementById("homeReportOtherType");if(!select||!other)return;var active=select.value==="Other";other.classList.toggle("active",active);other.required=active;if(!active)other.value="";}
  function openReport(){lock();modal.innerHTML='<div class="modalCard homeReportModalCard" role="dialog" aria-modal="true" aria-label="Report an Issue"><div class="homeReportModalHeader"><h2>Report an Issue</h2><button class="homeReportModalClose" id="closeHomeReportModal" type="button">×</button></div><form id="homeLogForm" class="stack"><select id="homeReportType" name="type"><option>Incident</option><option>Alcohol Refusal</option><option>Accident</option><option>Pest Sighting</option><option>Other</option></select><input class="homeReportOtherType" id="homeReportOtherType" name="otherType" placeholder="One-time incident type"><textarea class="homeReportSummaryBox" name="summary" placeholder="Short summary" required></textarea><textarea name="details" placeholder="Details, witnesses, action taken"></textarea><button class="primary">Add log</button></form></div>';modal.classList.add("homeReportIssueModalOpen");modal.classList.remove("hidden");document.getElementById("closeHomeReportModal").onclick=closeReport;modal.onclick=function(event){if(event.target===modal)closeReport();};document.getElementById("homeReportType").onchange=syncOtherType;syncOtherType();document.getElementById("homeLogForm").onsubmit=function(event){event.preventDefault();var data=new FormData(event.currentTarget);var type=data.get("type");var other=String(data.get("otherType")||"").trim();if(type==="Other"&&!other){document.getElementById("homeReportOtherType").reportValidity();return;}state.logs=state.logs||[];state.logs.push({id:uid(),type:type==="Other"?other:type,summary:data.get("summary"),details:data.get("details"),userId:state.currentUser,created:new Date().toISOString()});save();closeReport();render();};}
  document.addEventListener("click",function(event){var trigger=event.target.closest&&event.target.closest("[data-open-home-report-issue], .homeReportIssue summary");if(!trigger)return;event.preventDefault();event.stopPropagation();var details=trigger.closest&&trigger.closest("details");if(details)details.open=false;openReport();},true);
  document.addEventListener("touchmove",function(event){if(modal.classList.contains("homeReportIssueModalOpen")&&!event.target.closest(".homeReportModalCard"))event.preventDefault();},{passive:false});
  function todayStr(){return new Date().toISOString().slice(0,10);}
  function checkDoneToday(checkId){var d=todayStr();return (state.done||[]).some(function(item){return item.checkId===checkId&&item.date===d;});}
  function checkCount(){try{return (state.checks||[]).filter(function(check){return !check.hiddenFromChecksPage&&!checkDoneToday(check.id);}).length;}catch(e){return 0;}}
  function syncChecksBadge(){var button=document.querySelector('.bottomNav .navBtn[data-route="checks"]');if(!button)return;var count=checkCount();if(count>0)button.setAttribute("data-alert-count",String(count));else button.removeAttribute("data-alert-count");}
  if(typeof render==="function"&&!render.__homeReportBadgeFixWrapped){var oldRender=render;render=function(){oldRender();syncChecksBadge();setTimeout(syncChecksBadge,0);};render.__homeReportBadgeFixWrapped=true;}
  setInterval(syncChecksBadge,1000);document.addEventListener("click",function(){setTimeout(syncChecksBadge,0);},true);document.addEventListener("change",function(){setTimeout(syncChecksBadge,0);},true);setTimeout(syncChecksBadge,0);
})();
</script>
