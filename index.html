<script>
(function(){
  if(window.__maintenanceLayoutPopupV1) return;
  window.__maintenanceLayoutPopupV1 = true;
  var lockedScrollY = 0;
  var style = document.createElement("style");
  style.textContent = ".homeReportIssue>form{display:none!important}.homeReportIssue summary{display:flex!important;justify-content:center!important;text-align:center!important}.homeReportIssue summary:after{content:none!important;display:none!important}.maintenancePageNew{display:grid!important;gap:16px!important}.maintenanceSection{display:grid!important;gap:12px!important}.maintenanceSectionTitle{margin:0!important}.reportIssueButton,.reportMaintenanceButton{width:100%!important;cursor:pointer!important;display:flex!important;align-items:center!important;justify-content:center!important;text-align:center!important;font-size:22px!important;font-weight:900!important;color:#d83b2d!important;border:1px solid rgba(255,255,255,.09)!important}.reportMaintenanceButton{color:#d0ad58!important}.reportedIssueList,.maintenanceIssueList{display:grid!important;gap:10px!important}.reportedIssueItem,.maintenanceIssueItem{border:1px solid rgba(255,255,255,.09)!important;border-radius:18px!important;background:rgba(255,255,255,.035)!important;overflow:hidden!important}.reportedIssueItem summary,.maintenanceIssueItem summary{list-style:none!important;cursor:pointer!important;display:grid!important;grid-template-columns:minmax(0,1fr) auto!important;align-items:center!important;gap:12px!important;padding:14px!important}.reportedIssueItem summary::-webkit-details-marker,.maintenanceIssueItem summary::-webkit-details-marker{display:none!important}.reportedIssueItem strong,.maintenanceIssueItem strong{display:block!important;color:#fff8ea!important;font-size:17px!important;line-height:1.15!important}.reportedIssueItem small,.maintenanceIssueItem small{display:block!important;color:#aaa194!important;font-size:13px!important;margin-top:4px!important}.issueBody{padding:0 14px 14px!important;display:grid!important;gap:12px!important}.issueBody p{margin:0!important}.shoppingListHeader{display:grid!important;grid-template-columns:minmax(0,1fr) 58px!important;gap:12px!important;align-items:center!important}.shoppingListIcon{width:58px!important;height:58px!important;border-radius:18px!important;display:grid!important;place-items:center!important;color:#d0ad58!important;background:rgba(176,145,74,.16)!important;font-size:34px!important;font-weight:900!important}.shoppingForm{display:grid!important;grid-template-columns:minmax(0,1fr) 76px!important;gap:10px!important;margin:14px 0!important}.shoppingListItems{list-style:none!important;padding:0!important;margin:0!important;display:grid!important;gap:8px!important}.shoppingListItems li{display:grid!important;grid-template-columns:minmax(0,1fr) auto!important;gap:10px!important;align-items:center!important;padding:10px 12px!important;border-radius:14px!important;background:rgba(255,255,255,.04)!important;border:1px solid rgba(255,255,255,.08)!important}.shoppingListItems span{color:#fff8ea!important;font-weight:800!important}.rotaHomePanel>h2,.rotaHomePanel .homeShiftList{display:none!important}body.report-modal-open{overflow:hidden!important;position:fixed!important;width:100%!important;left:0!important;right:0!important}#modal.reportModalOpen{position:fixed!important;inset:calc(var(--fixed-topbar-height,112px) + var(--fixed-mainnav-height,80px)) 0 0 0!important;z-index:1000!important;display:flex!important;align-items:flex-start!important;justify-content:center!important;padding:16px 14px max(16px,env(safe-area-inset-bottom))!important;background:rgba(0,0,0,.58)!important;box-sizing:border-box!important;overflow:hidden!important}#modal.reportModalOpen.hidden{display:none!important}#modal.reportModalOpen .reportModalCard{width:min(680px,100%)!important;max-height:100%!important;margin:0!important;overflow-y:auto!important;overflow-x:hidden!important;-webkit-overflow-scrolling:touch!important;box-sizing:border-box!important;border-radius:24px!important;padding:18px!important}#modal.reportModalOpen .reportModalHeader{display:grid!important;grid-template-columns:minmax(0,1fr) 38px!important;align-items:center!important;gap:12px!important;margin-bottom:14px!important}#modal.reportModalOpen .reportModalHeader h2{margin:0!important;color:#d83b2d!important}#modal.reportModalOpen .reportModalClose{width:38px!important;height:38px!important;min-width:38px!important;min-height:38px!important;border-radius:999px!important;display:flex!important;align-items:center!important;justify-content:center!important;padding:0!important;margin:0!important;border:0!important;background:rgba(8,10,12,.72)!important;color:#fff8ea!important;font-size:26px!important;line-height:1!important}.reportSummaryBox{min-height:92px!important;resize:vertical!important}.reportOtherType{display:none!important}.reportOtherType.active{display:block!important}";
  document.head.appendChild(style);
  function escX(value){return String(value==null?"":value).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];});}
  function shoppingItems(){if(!Array.isArray(state.shoppingItems))state.shoppingItems=[];return state.shoppingItems;}
  function shoppingMarkup(){var items=shoppingItems().filter(function(i){return i.status!=="Completed";});if(!items.length)return '<p class="muted">Nothing on the shopping list yet.</p>';return '<ul class="shoppingListItems">'+items.map(function(i){return '<li><span>'+escX(i.title)+'</span><button type="button" class="ghost small" data-shopping-complete="'+escX(i.id)+'">Done</button></li>';}).join('')+'</ul>';}
  function reportedMarkup(){var logs=(state.logs||[]).slice().reverse();if(!logs.length)return '<p class="muted">No reported issues yet.</p>';return '<div class="reportedIssueList">'+logs.map(function(log){return '<details class="reportedIssueItem"><summary><span><strong>'+escX(log.type||'Reported issue')+'</strong><small>'+escX(log.summary||'No summary')+'</small></span><span class="maintenanceExpandIcon">⌄</span></summary><div class="issueBody"><p>'+escX(log.details||'No extra details added.')+'</p></div></details>';}).join('')+'</div>';}
  function maintMarkup(){var issues=(state.issues||[]).filter(function(i){return i.status!=="Resolved";});if(!issues.length)return '<p class="muted">No open maintenance issues.</p>';return '<div class="maintenanceIssueList">'+issues.map(function(i){return '<details class="maintenanceIssueItem"><summary><span><strong>'+escX(i.title)+'</strong><small>'+escX(i.area||'No location set')+'</small></span><span class="maintenanceExpandIcon">⌄</span></summary><div class="issueBody"><p>'+escX(i.notes||'No extra details added.')+'</p><button type="button" class="primary" data-issue="'+escX(i.id)+'">Mark as complete</button></div></details>';}).join('')+'</div>';}
  logs=function(){return '<section class="maintenancePageNew"><article class="card maintenanceSection"><h2 class="maintenanceSectionTitle">Issues reported</h2>'+reportedMarkup()+'<button class="card reportIssueButton" type="button" data-open-report-issue>Report an Issue</button></article><article class="card maintenanceSection"><h2 class="maintenanceSectionTitle">Maintenance issues</h2>'+maintMarkup()+'<button class="card reportMaintenanceButton" type="button" data-open-maintenance-issue>Report Maintenance Issue</button></article><article class="card shoppingListCard"><div class="shoppingListHeader"><div><h2>Shopping list</h2><p class="muted">Add things the team are running low on.</p></div><div class="shoppingListIcon" aria-hidden="true">▤</div></div><form id="shoppingForm" class="shoppingForm"><input name="title" placeholder="Add item, e.g. mint tea" required><button class="primary">Add</button></form>'+shoppingMarkup()+'</article></section>';};
  function lock(){lockedScrollY=window.scrollY||document.documentElement.scrollTop||document.body.scrollTop||0;document.body.style.top='-'+lockedScrollY+'px';document.body.classList.add('report-modal-open');document.documentElement.style.overflow='hidden';}
  function unlock(){document.body.classList.remove('report-modal-open');document.body.style.top='';document.documentElement.style.overflow='';window.scrollTo(0,lockedScrollY||0);}
  function closeModal(){modal.classList.add('hidden');modal.classList.remove('reportModalOpen');modal.innerHTML='';unlock();}
  function syncOther(){var s=document.getElementById('reportType');var o=document.getElementById('reportOtherType');if(!s||!o)return;var active=s.value==='Other';o.classList.toggle('active',active);o.required=active;if(!active)o.value='';}
  function openIncidentModal(){lock();modal.innerHTML='<div class="modalCard reportModalCard" role="dialog" aria-modal="true"><div class="reportModalHeader"><h2>Report an Issue</h2><button class="reportModalClose" id="closeReportModal" type="button">×</button></div><form id="reportIssueForm" class="stack"><select id="reportType" name="type"><option>Incident</option><option>Alcohol Refusal</option><option>Accident</option><option>Pest Sighting</option><option>Other</option></select><input class="reportOtherType" id="reportOtherType" name="otherType" placeholder="One-time incident type"><textarea class="reportSummaryBox" name="summary" placeholder="Short summary" required></textarea><textarea name="details" placeholder="Details, witnesses, action taken"></textarea><button class="primary">Report Issue</button></form></div>';modal.classList.add('reportModalOpen');modal.classList.remove('hidden');document.getElementById('closeReportModal').onclick=closeModal;modal.onclick=function(e){if(e.target===modal)closeModal();};document.getElementById('reportType').onchange=syncOther;syncOther();document.getElementById('reportIssueForm').onsubmit=function(e){e.preventDefault();var d=new FormData(e.currentTarget);var type=d.get('type');var other=String(d.get('otherType')||'').trim();if(type==='Other'&&!other){document.getElementById('reportOtherType').reportValidity();return;}state.logs=state.logs||[];state.logs.push({id:uid(),type:type==='Other'?other:type,summary:d.get('summary'),details:d.get('details'),userId:state.currentUser,created:new Date().toISOString()});save();closeModal();render();};}
  function openMaintenanceModal(){lock();modal.innerHTML='<div class="modalCard reportModalCard" role="dialog" aria-modal="true"><div class="reportModalHeader"><h2>Report Maintenance Issue</h2><button class="reportModalClose" id="closeReportModal" type="button">×</button></div><form id="reportMaintenanceForm" class="stack"><input name="title" placeholder="Issue title" required><input name="area" placeholder="Location" required><textarea name="notes" placeholder="What needs fixing?" required></textarea><button class="primary">Report maintenance issue</button></form></div>';modal.classList.add('reportModalOpen');modal.classList.remove('hidden');document.getElementById('closeReportModal').onclick=closeModal;modal.onclick=function(e){if(e.target===modal)closeModal();};document.getElementById('reportMaintenanceForm').onsubmit=function(e){e.preventDefault();var d=new FormData(e.currentTarget);state.issues=state.issues||[];state.issues.push({id:uid(),title:d.get('title'),area:d.get('area'),severity:'Maintenance',notes:d.get('notes'),status:'Open',created:new Date().toISOString(),userId:state.currentUser});save();closeModal();render();};}
  document.addEventListener('click',function(e){var report=e.target.closest&&e.target.closest('[data-open-report-issue], [data-open-home-report-issue], .homeReportIssue summary');if(report){e.preventDefault();e.stopPropagation();var details=report.closest&&report.closest('details');if(details)details.open=false;openIncidentModal();return;}var maint=e.target.closest&&e.target.closest('[data-open-maintenance-issue]');if(maint){e.preventDefault();e.stopPropagation();openMaintenanceModal();return;}var done=e.target.closest&&e.target.closest('[data-issue]');if(done&&done.closest('.maintenancePageNew')){e.preventDefault();var item=(state.issues||[]).find(function(i){return i.id===done.getAttribute('data-issue');});if(item)item.status='Resolved';save();render();}},true);
  document.addEventListener('touchmove',function(e){if(modal.classList.contains('reportModalOpen')&&!e.target.closest('.reportModalCard'))e.preventDefault();},{passive:false});
  function todayStr(){return new Date().toISOString().slice(0,10);}
  function checkDoneToday(id){var d=todayStr();return (state.done||[]).some(function(i){return i.checkId===id&&i.date===d;});}
  function syncChecksBadge(){var b=document.querySelector('.bottomNav .navBtn[data-route="checks"]');if(!b)return;var c=(state.checks||[]).filter(function(ch){return !ch.hiddenFromChecksPage&&!checkDoneToday(ch.id);}).length;if(c>0)b.setAttribute('data-alert-count',String(c));else b.removeAttribute('data-alert-count');}
  if(typeof render==='function'&&!render.__maintenanceLayoutPopupWrapped){var oldRender=render;render=function(){oldRender();syncChecksBadge();setTimeout(syncChecksBadge,0);};render.__maintenanceLayoutPopupWrapped=true;}
  setInterval(syncChecksBadge,1000);setTimeout(function(){syncChecksBadge();if(state.route==='logs'||window.location.hash==='#logs')render();},0);
})();
</script>
