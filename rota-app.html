<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rota App</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ChipButt/Test@Rota-App/styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ChipButt/Test@Rota-App/schedule-admin-overrides.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ChipButt/Test@Rota-App/final-ui-overrides.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ChipButt/Test@Rota-App/hard-schedule-fix.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ChipButt/Test@Rota-App/schedule-shift-block.css" />
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #050607;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
    }

    #app {
      min-height: 100vh;
      background: #050607;
    }

    /* Embedded inside Compliance: remove the wasted Rota header/nav space. */
    .topbar,
    .tabs,
    header.topbar,
    nav.tabs {
      display: none !important;
      height: 0 !important;
      min-height: 0 !important;
      max-height: 0 !important;
      padding: 0 !important;
      margin: 0 !important;
      border: 0 !important;
      overflow: hidden !important;
    }

    main {
      margin: 0 !important;
      padding: 0 !important;
      min-height: 100vh !important;
      height: 100vh !important;
      overflow: hidden !important;
    }

    #rotaView,
    .view.active {
      margin: 0 !important;
      padding: 0 !important;
      min-height: 100vh !important;
      height: 100vh !important;
      display: block !important;
      overflow: hidden !important;
    }

    #rotaGrid,
    .rotaGrid {
      margin-top: 0 !important;
      padding-top: 0 !important;
      height: 100vh !important;
      min-height: 100vh !important;
      max-height: 100vh !important;
      overflow: auto !important;
      -webkit-overflow-scrolling: touch;
    }
  </style>
</head>
<body>
  <div id="app">
    <main>
      <section id="rotaView" class="view active">
        <div id="rotaGrid" class="rotaGrid"></div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/ChipButt/Test@Rota-App/app.js"></script>
