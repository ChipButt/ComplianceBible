<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rota App</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ChipButt/Test@Rota-App/styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ChipButt/Test@Rota-App/schedule-admin-overrides.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ChipButt/Test@Rota-App/final-ui-overrides.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ChipButt/Test@Rota-App/hard-schedule-fix.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ChipButt/Test@Rota-App/schedule-shift-block.css" />
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #050607;
      overflow-x: hidden !important;
      overflow-y: auto !important;
      width: 100% !important;
      max-width: 100vw !important;
    }

    * {
      box-sizing: border-box !important;
    }

    body {
      min-height: 100vh;
    }

    #app {
      min-height: 100vh;
      background: #050607;
      width: 100% !important;
      max-width: 100vw !important;
      overflow-x: hidden !important;
      overflow-y: visible !important;
    }

    /* Embedded inside Compliance: remove the wasted Rota header/nav space. */
    .topbar,
    .tabs,
    header.topbar,
    nav.tabs {
      display: none !important;
      height: 0 !important;
      min-height: 0 !important;
      max-height: 0 !important;
      padding: 0 !important;
      margin: 0 !important;
      border: 0 !important;
      overflow: hidden !important;
    }

    main {
      margin: 0 !important;
      padding: 0 !important;
      min-height: 100vh !important;
      height: auto !important;
      overflow-x: hidden !important;
      overflow-y: visible !important;
      width: 100% !important;
      max-width: 100vw !important;
    }

    #rotaView,
    .view.active {
      margin: 0 !important;
      padding: 0 !important;
      min-height: 100vh !important;
      height: auto !important;
      display: block !important;
      overflow-x: hidden !important;
      overflow-y: visible !important;
      width: 100% !important;
      max-width: 100vw !important;
    }

    #rotaGrid,
    .rotaGrid {
      margin-top: 0 !important;
      padding-top: 0 !important;
      height: auto !important;
      min-height: 1450px !important;
      max-height: none !important;
      overflow-x: hidden !important;
      overflow-y: visible !important;
      width: 100% !important;
      max-width: 100vw !important;
      -webkit-overflow-scrolling: touch;
    }

    #rotaGrid table,
    #rotaGrid .scheduleGrid,
    #rotaGrid .schedule-grid,
    #rotaGrid .weekGrid,
    #rotaGrid .week-grid,
    .rotaGrid table,
    .rotaGrid .scheduleGrid,
    .rotaGrid .schedule-grid,
    .rotaGrid .weekGrid,
    .rotaGrid .week-grid {
      width: 100% !important;
      max-width: 100% !important;
      min-width: 0 !important;
      table-layout: fixed !important;
    }

    #rotaGrid th,
    #rotaGrid td,
    .rotaGrid th,
    .rotaGrid td {
      min-width: 0 !important;
      max-width: none !important;
      overflow: hidden !important;
      text-overflow: ellipsis !important;
    }

    #rotaGrid [class*="week"],
    #rotaGrid [class*="Week"],
    #rotaGrid [class*="date"],
    #rotaGrid [class*="Date"],
    .rotaGrid [class*="week"],
    .rotaGrid [class*="Week"],
    .rotaGrid [class*="date"],
    .rotaGrid [class*="Date"] {
      color: #fff8ea !important;
    }

    #rotaGrid h1,
    #rotaGrid h2,
    #rotaGrid h3,
    .rotaGrid h1,
    .rotaGrid h2,
    .rotaGrid h3 {
      color: #fff8ea !important;
    }
  </style>
</head>
<body>
  <div id="app">
    <main>
      <section id="rotaView" class="view active">
        <div id="rotaGrid" class="rotaGrid"></div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/ChipButt/Test@Rota-App/app.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/ChipButt/Test@Rota-App/validation-patch.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/ChipButt/Test@Rota-App/rota-planning-patch.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/ChipButt/Test@Rota-App/payroll-breaks-patch.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/ChipButt/Test@Rota-App/unassigned-shifts-patch.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/ChipButt/Test@Rota-App/pronouns-salary-patch.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/ChipButt/Test@Rota-App/permissions-sections-final-patch.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/ChipButt/Test@Rota-App/final-corrections-patch.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/ChipButt/Test@Rota-App/final-top-nav-patch.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/ChipButt/Test@Rota-App/final-admin-timesheets-report.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/ChipButt/Test@Rota-App/final-admin-page-nav.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/ChipButt/Test@Rota-App/final-render-on-load.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/ChipButt/Test@Rota-App/absolute-final-fix.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/ChipButt/Test@Rota-App/absolute-home-final.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/ChipButt/Test@Rota-App/replacement-final.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/ChipButt/Test@Rota-App/profile-save-final.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/ChipButt/Test@Rota-App/visibility-and-card-final.js"></script>
  <script src="rota-no-people.js?v=20260614-1"></script>
</body>
</html>
